<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #f5f0e8;
  --bg2:   #ede8de;
  --card:  #faf7f2;
  --bdr:   rgba(160,145,120,0.18);
  --bdr2:  rgba(160,145,120,0.35);
  --text:  #2c2416;
  --muted: #8a7d68;
  --muted2:#b5a890;
  --acc:   #7c5c2e;
  --acc2:  #a07840;
  --grn:   #2d7a4f;
  --red:   #b84040;
  --amb:   #a06830;
  --serif: 'Playfair Display', Georgia, serif;
  --sans:  'DM Sans', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.4}

.header{background:var(--card);border-bottom:1px solid var(--bdr2);padding:9px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:var(--serif);font-size:16px;font-weight:600;color:var(--acc)}
.logo span{font-family:var(--sans);font-size:11px;color:var(--muted);font-weight:300;margin-left:8px}
.hright{display:flex;align-items:center;gap:12px}
.ts{font-size:11px;color:var(--muted)}
.rbtn{background:var(--acc);color:#faf7f2;border:none;padding:5px 11px;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;transition:opacity .2s}
.rbtn:hover{opacity:.85}
.rbtn.loading{opacity:.5;pointer-events:none}

.ticker{background:var(--acc);padding:4px 0;overflow:hidden}
.ticker-in{display:flex;gap:24px;animation:tick 50s linear infinite;width:max-content}
.ticker-in:hover{animation-play-state:paused}
@keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ti{display:flex;align-items:center;gap:5px;font-size:11px;white-space:nowrap;color:#faf7f2}
.ts2{font-weight:600;opacity:.65;font-size:10px;letter-spacing:.06em}
.tup{color:#86e0a8}.tdn{color:#f4a0a0}
.tdot{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.2);flex-shrink:0}

.main{padding:12px 16px}

.sec{font-size:9px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--muted2);margin:12px 0 6px;display:flex;align-items:center;gap:8px}
.sec::before{content:'';width:12px;height:1px;background:var(--muted2)}
.sec::after{content:'';flex:1;height:1px;background:var(--bdr)}

.row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:2px}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:9px 11px;flex:1;min-width:0;transition:border-color .2s,box-shadow .2s}
.card:hover{border-color:var(--bdr2);box-shadow:0 2px 10px rgba(124,92,46,.05)}
.card[data-sym]{cursor:pointer}
.card[data-sym]:hover{border-color:var(--acc2)}
.csym{font-size:9px;font-weight:600;letter-spacing:.1em;color:var(--muted2);margin-bottom:2px}
.cname{font-size:11px;color:var(--muted);margin-bottom:3px}
.cval{font-family:var(--serif);font-size:15px;font-weight:500;color:var(--text);line-height:1;margin-bottom:3px}
.cunit{font-size:10px;color:var(--muted2);font-family:var(--sans);font-weight:400;margin-left:2px}
.cch{font-size:11px;font-weight:500;display:flex;align-items:center;gap:3px}
.up{color:var(--grn)}.dn{color:var(--red)}.neu{color:var(--muted)}
.ar{font-size:9px}

.bot{display:flex;gap:7px;align-items:flex-start}
.bot>*{flex:1;min-width:0}

.tcard{background:var(--card);border:1px solid var(--bdr);border-radius:8px;overflow:hidden}
.thead{font-size:9px;letter-spacing:.14em;font-weight:600;text-transform:uppercase;color:var(--muted);padding:7px 11px 5px;border-bottom:1px solid var(--bdr);background:var(--bg2)}
.trow{display:flex;justify-content:space-between;align-items:center;padding:5px 11px;border-bottom:1px solid var(--bdr);font-size:12px}
.trow:last-child{border-bottom:none}
.trow:hover{background:var(--bg2)}
.tk{color:var(--text)}
.tv{font-weight:600;font-family:var(--serif)}
.tvr{color:var(--acc)}
.tvm{color:var(--amb)}
.tvg{color:var(--grn)}
.tnote{font-size:10px;color:var(--muted2)}

.ccard{background:var(--card);border:1px solid var(--bdr);border-radius:8px;overflow:hidden}
.crow{display:flex;align-items:center;justify-content:space-between;padding:7px 11px;border-bottom:1px solid var(--bdr)}
.crow:last-child{border-bottom:none}
.crow:hover{background:var(--bg2)}
.cnname{font-size:12px;font-weight:500}
.cnsym{font-size:10px;color:var(--muted2)}
.cnp{font-family:var(--serif);font-size:13px;font-weight:500;text-align:right}
.cnch{font-size:11px;font-weight:500;text-align:right}

.ncard{background:var(--card);border:1px solid var(--bdr);border-radius:8px;overflow:hidden}
.nitem{display:block;text-decoration:none;color:inherit;padding:7px 11px;border-bottom:1px solid var(--bdr);transition:background .15s}
.nitem:last-child{border-bottom:none}
.nitem:hover{background:var(--bg2)}
.nhead{font-size:12px;line-height:1.35;margin-bottom:3px;color:var(--text)}
.nmeta{font-size:10px;color:var(--muted2);display:flex;gap:8px}
.nsrc{color:var(--acc);font-weight:500}

/* Modal */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(44,36,22,.6);z-index:200;backdrop-filter:blur(3px);padding:20px;overflow-y:auto}
.modal-box{background:var(--card);border-radius:12px;padding:20px;max-width:640px;width:100%;margin:0 auto;position:relative}
.modal-x{position:absolute;top:10px;right:14px;background:none;border:none;font-size:24px;cursor:pointer;color:var(--muted);line-height:1;padding:2px 6px;font-family:var(--sans)}
.modal-x:hover{color:var(--text)}
.pbtn{background:var(--bg2);border:1px solid var(--bdr2);border-radius:5px;padding:3px 11px;font-size:11px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .15s;font-family:var(--sans)}
.pbtn.active{background:var(--acc);border-color:var(--acc);color:#faf7f2}
.pbtn:hover:not(.active){border-color:var(--acc2);color:var(--acc)}

@media(max-width:700px){.bot{flex-direction:column}}
@media(max-width:500px){.row .card{min-width:calc(50% - 4px)}}
</style>
</head>
<body>

<header class="header">
  <div><span class="logo">Market Dashboard<span>· dane na żywo</span></span></div>
  <div class="hright">
    <span class="ts" id="ts">—</span>
    <button class="rbtn" id="rbtn" onclick="fetchAll()">↻ Odśwież</button>
  </div>
</header>

<div class="ticker"><div class="ticker-in" id="ticker">
  <span class="ti"><span class="ts2">LOADING</span><span>—</span></span>
</div></div>

<main class="main">

  <div class="sec">Indeksy giełdowe</div>
  <div class="row" id="idx"></div>

  <div class="sec">Surowce</div>
  <div class="row" id="com"></div>

  <div class="sec">Waluty</div>
  <div class="row" id="fx"></div>

  <div class="sec">Kryptowaluty &amp; Stopy procentowe &amp; Makro</div>
  <div class="bot">

    <div class="ccard" id="crypto">
      <div class="crow"><div class="cnname" style="color:var(--muted)">Ładowanie...</div></div>
    </div>

    <div class="tcard" id="rates">
      <div class="thead">Stopy procentowe</div>
      <div class="trow"><div class="tk">Ładowanie...</div></div>
    </div>

    <div class="tcard" id="macro">
      <div class="thead">Dane makroekonomiczne</div>
      <div class="trow"><div class="tk">Ładowanie...</div></div>
    </div>

  </div>

  <div class="sec">Wiadomości finansowe</div>
  <div class="ncard" id="news">
    <div class="nitem"><div class="nhead" style="color:var(--muted)">Ładowanie wiadomości...</div></div>
  </div>

</main>

<!-- Chart modal -->
<div class="modal-ov" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <button class="modal-x" onclick="closeModal()">×</button>
    <div id="modal-title" style="font-family:var(--serif);font-size:18px;font-weight:600;color:var(--acc);margin-bottom:12px;padding-right:30px"></div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px">
      <button class="pbtn active" data-period="1M" onclick="loadModalChart('1M')">1M</button>
      <button class="pbtn" data-period="3M" onclick="loadModalChart('3M')">3M</button>
      <button class="pbtn" data-period="6M" onclick="loadModalChart('6M')">6M</button>
      <button class="pbtn" data-period="1Y" onclick="loadModalChart('1Y')">1 rok</button>
      <button class="pbtn" data-period="3Y" onclick="loadModalChart('3Y')">3 lata</button>
      <button class="pbtn" data-period="5Y" onclick="loadModalChart('5Y')">5 lat</button>
    </div>
    <div id="modal-chart" style="min-height:160px;display:flex;align-items:center;justify-content:center;color:var(--muted)">Ładowanie...</div>
    <div id="modal-info" style="font-size:11px;color:var(--muted2);margin-top:6px;text-align:right;min-height:16px"></div>
  </div>
</div>

<script>
const f2=(n,d=2)=>n==null?'—':Number(n).toLocaleString('pl-PL',{minimumFractionDigits:d,maximumFractionDigits:d});
const pct=n=>n==null?'—':(n>0?'+':'')+Number(n).toFixed(2)+'%';
const cc=n=>n==null?'neu':n>0?'up':n<0?'dn':'neu';
const ar=n=>n==null?'':n>0?'▲':n<0?'▼':'–';

// Yahoo Finance period config
const PERIODS={
  '1M':{range:'1mo',interval:'1d'},
  '3M':{range:'3mo',interval:'1d'},
  '6M':{range:'6mo',interval:'1d'},
  '1Y':{range:'1y', interval:'1d'},
  '3Y':{range:'3y', interval:'1wk'},
  '5Y':{range:'5y', interval:'1wk'},
};
let _mSym='', _mName='';

function card(sym,name,val,chg,unit='',spark='',clickSym=''){
  const c=cc(chg);
  const da=clickSym?` data-sym="${clickSym}" data-name="${name}"`:''
  return `<div class="card"${da}>
    <div class="csym">${sym}</div>
    <div class="cname">${name}</div>
    <div class="cval">${val}${unit?`<span class="cunit">${unit}</span>`:''}</div>
    <div class="cch ${c}"><span class="ar">${ar(chg)}</span><span>${pct(chg)}</span></div>
    ${spark}
  </div>`;
}

document.addEventListener('click',e=>{
  const c=e.target.closest('.card[data-sym]');
  if(c) openChart(c.dataset.sym, c.dataset.name);
});

// ── API helpers ──────────────────────────────────────────────

async function getFX(){
  try{
    const r=await fetch('https://open.er-api.com/v6/latest/USD');
    return(await r.json()).rates;
  }catch(e){return null;}
}

async function getCrypto(){
  try{
    const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,ripple&vs_currencies=usd&include_24hr_change=true');
    return r.json();
  }catch(e){return null;}
}

// Parse Yahoo Finance v8 JSON response
function parseYF(json){
  const res=json.chart?.result?.[0];
  if(!res) return null;
  const meta=res.meta;
  const price=meta.regularMarketPrice||meta.regularMarketPreviousClose;
  const prev=meta.chartPreviousClose||meta.previousClose;
  if(!price||price<=0) return null;
  const chg=prev?((price-prev)/prev*100):null;
  const ts=res.timestamp||[];
  const cl=res.indicators?.quote?.[0]?.close||[];
  const history=ts.map((s,i)=>{const p=cl[i];return(p&&!isNaN(p)&&p>0)?{d:new Date(s*1000).toISOString().slice(0,10),p}:null;}).filter(Boolean);
  return{price,chg,history};
}

// Fetch with timeout helper
async function tf(url,ms=8000){
  const c=new AbortController();
  const t=setTimeout(()=>c.abort(),ms);
  try{const r=await fetch(url,{signal:c.signal});clearTimeout(t);return r;}
  catch(e){clearTimeout(t);throw e;}
}

// Yahoo Finance v8 — price + 30-day sparkline history
// allorigins proxy is PRIMARY (avoids Yahoo CORS issues)
async function getYF(symbol){
  const yfUrl=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?interval=1d&range=1mo&includePrePost=false`;
  const urls=[
    `https://api.allorigins.win/raw?url=${encodeURIComponent(yfUrl)}`,
    yfUrl,
  ];
  for(const url of urls){
    try{
      const r=await tf(url,8000);
      if(!r.ok) continue;
      const json=await r.json();
      const result=parseYF(json);
      if(result) return result;
    }catch(e){continue;}
  }
  return null;
}

// Yahoo Finance v8 — historical data for modal chart
async function getChartData(symbol,range,interval){
  const yfUrl=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?interval=${interval}&range=${range}&includePrePost=false`;
  const urls=[
    `https://api.allorigins.win/raw?url=${encodeURIComponent(yfUrl)}`,
    yfUrl,
  ];
  for(const url of urls){
    try{
      const r=await tf(url,10000);
      if(!r.ok) continue;
      const json=await r.json();
      const res=json.chart?.result?.[0];
      if(!res) continue;
      const ts=res.timestamp||[];
      const cl=res.indicators?.quote?.[0]?.close||[];
      const data=ts.map((s,i)=>{const p=cl[i];return(p&&!isNaN(p)&&p>0)?{d:new Date(s*1000).toISOString().slice(0,10),p}:null;}).filter(Boolean);
      if(data.length>2) return data;
    }catch(e){continue;}
  }
  return[];
}

// Mini sparkline SVG
function sparklineSVG(history,chg){
  if(!history||history.length<2) return '';
  const prices=history.map(x=>x.p);
  const min=Math.min(...prices),max=Math.max(...prices),range=max-min||1;
  const W=100,H=26;
  const pts=prices.map((p,i)=>`${((i/(prices.length-1))*W).toFixed(1)},${(H-((p-min)/range)*H*0.82-2).toFixed(1)}`).join(' ');
  const col=chg==null?'#b5a890':chg>=0?'#2d7a4f':'#b84040';
  return`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:26px;display:block;margin-top:5px;opacity:.9"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}

// News — RSS via allorigins proxy + DOMParser (no rss2json rate limits)
function parseRSS(xml,src){
  try{
    const doc=new DOMParser().parseFromString(xml,'text/xml');
    if(doc.querySelector('parsererror')) return[];
    return[...doc.querySelectorAll('item')].slice(0,7).map(it=>{
      const title=(it.querySelector('title')?.textContent||'').replace(/<!\[CDATA\[|\]\]>/g,'').trim();
      // <link> in RSS is tricky — sometimes text node, sometimes next sibling
      let link=it.querySelector('link')?.textContent?.trim()||'';
      if(!link||link==='\n'){
        // try guid or enclosure
        link=it.querySelector('guid')?.textContent?.trim()||
             it.querySelector('enclosure')?.getAttribute('url')||'';
      }
      const pd=it.querySelector('pubDate')?.textContent||'';
      const date=pd?new Date(pd).toLocaleString('pl-PL',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';
      return title?{title,link,src,date}:null;
    }).filter(Boolean);
  }catch(e){return[];}
}

async function fetchFeed(url,src){
  try{
    const r=await tf(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,8000);
    if(!r.ok) return[];
    const txt=await r.text();
    if(!txt.includes('<item')) return[];
    return parseRSS(txt,src);
  }catch(e){return[];}
}

async function getNews(){
  // All feeds in parallel — take first non-empty result (max 8s total)
  const feeds=[
    {url:'https://feeds.bbci.co.uk/news/business/rss.xml',src:'BBC Business'},
    {url:'https://www.cnbc.com/id/10000664/device/rss/rss.html',src:'CNBC'},
    {url:'https://rss.nytimes.com/services/xml/rss/nyt/Business.xml',src:'NY Times'},
  ];
  const results=await Promise.allSettled(feeds.map(f=>fetchFeed(f.url,f.src)));
  for(const r of results){
    if(r.status==='fulfilled'&&r.value?.length) return r.value;
  }
  return[];
}

// ── Modal ────────────────────────────────────────────────────

function openChart(sym,name){
  _mSym=sym; _mName=name;
  document.getElementById('modal-title').textContent=name;
  document.getElementById('modal').style.display='block';
  document.body.style.overflow='hidden';
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.toggle('active',b.dataset.period==='1M'));
  loadModalChart('1M');
}
function closeModal(){
  document.getElementById('modal').style.display='none';
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

async function loadModalChart(period){
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.toggle('active',b.dataset.period===period));
  const el=document.getElementById('modal-chart');
  el.style.display='flex'; el.innerHTML='<span style="color:var(--muted)">Ładowanie...</span>';
  document.getElementById('modal-info').textContent='';
  const {range,interval}=PERIODS[period]||PERIODS['1M'];
  const data=await getChartData(_mSym,range,interval);
  el.style.display='block';
  el.innerHTML=renderModalChart(data);
  if(data.length>=2){
    const chgPct=((data[data.length-1].p-data[0].p)/data[0].p*100);
    document.getElementById('modal-info').textContent=
      `${data.length} sesji · ${data[0].d} → ${data[data.length-1].d} · zmiana: ${chgPct>=0?'+':''}${chgPct.toFixed(2)}%`;
  }else{
    document.getElementById('modal-info').textContent='Brak danych dla wybranego okresu';
  }
}

function renderModalChart(data){
  if(!data||data.length<2)
    return '<div style="text-align:center;padding:50px 0;color:var(--muted)">Brak danych historycznych</div>';

  const prices=data.map(x=>x.p);
  const dates=data.map(x=>{
    const d=new Date(x.d+'T12:00:00');
    return d.toLocaleDateString('pl-PL',{day:'numeric',month:'short'});
  });
  const min=Math.min(...prices),max=Math.max(...prices),range=max-min||1;
  const W=560,H=180,PL=62,PR=8,PT=10,PB=24;
  const cw=W-PL-PR,ch=H-PT-PB;
  const xOf=i=>PL+(i/(prices.length-1))*cw;
  const yOf=p=>PT+((max-p)/range)*ch;
  const chg=prices[prices.length-1]-prices[0];
  const col=chg>=0?'#2d7a4f':'#b84040';
  const fill=chg>=0?'rgba(45,122,79,0.1)':'rgba(184,64,64,0.1)';
  const pts=prices.map((p,i)=>`${xOf(i).toFixed(1)},${yOf(p).toFixed(1)}`).join(' ');
  const areaD=`M${xOf(0).toFixed(1)},${yOf(prices[0]).toFixed(1)} `+
    prices.slice(1).map((p,i)=>`L${xOf(i+1).toFixed(1)},${yOf(p).toFixed(1)}`).join(' ')+
    ` L${xOf(prices.length-1).toFixed(1)},${(PT+ch).toFixed(1)} L${PL},${(PT+ch).toFixed(1)} Z`;
  const fmtY=v=>v>=10000?f2(v,0):v>=1000?f2(v,1):v>=10?f2(v,2):f2(v,3);
  const yLabels=[0,1,2,3].map(i=>{
    const val=min+range*i/3, y=yOf(val).toFixed(1);
    return `<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="rgba(160,145,120,0.2)" stroke-dasharray="3,3"/>
    <text x="${PL-5}" y="${y}" text-anchor="end" dominant-baseline="middle" font-size="9" fill="#8a7d68">${fmtY(val)}</text>`;
  }).join('');
  const xLabels=[0,Math.floor((prices.length-1)/2),prices.length-1].map(i=>
    `<text x="${xOf(i).toFixed(1)}" y="${H-4}" text-anchor="middle" font-size="9" fill="#8a7d68">${dates[i]||''}</text>`
  ).join('');
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">
    ${yLabels}
    <path d="${areaD}" fill="${fill}"/>
    <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${xLabels}
  </svg>`;
}

// ── Static data ──────────────────────────────────────────────

const RATES=[
  {k:'Fed Funds Rate (USA)',v:'4.25–4.50%'},
  {k:'EBC Deposit Rate',v:'2.50%'},
  {k:'NBP Stopa ref. (PL)',v:'5.75%'},
  {k:'Bank of England',v:'4.50%'},
  {k:'UST 10Y Yield',v:'4.42%'},
  {k:'Bund 10Y Yield (DE)',v:'2.58%'},
  {k:'Polish 10Y Yield',v:'5.71%'},
];
const MACRO=[
  {k:'Inflacja CPI PL',v:'4.9%',n:'GUS, mar 2025'},
  {k:'Inflacja CPI USA',v:'2.4%',n:'BLS, mar 2025'},
  {k:'Inflacja CPI UE',v:'2.2%',n:'Eurostat, lut 2025'},
  {k:'PKB PL (r/r)',v:'+3.2%',n:'GUS, Q4 2024'},
  {k:'PKB USA (r/r)',v:'+2.4%',n:'BEA, Q4 2024'},
  {k:'Bezrobocie PL',v:'5.2%',n:'GUS, lut 2025'},
];

// ── Main fetch ───────────────────────────────────────────────

async function fetchAll(){
  const btn=document.getElementById('rbtn');
  btn.classList.add('loading');btn.textContent='↻ Ładowanie...';

  // Yahoo Finance symbols: indices & commodities
  const [fxR,crR,spR,nqR,dxR,wgR,goldR,silvR,copR,oilR,newsR]=await Promise.allSettled([
    getFX(),getCrypto(),
    getYF('^GSPC'),getYF('^IXIC'),getYF('^GDAXI'),getYF('^WIG20'),
    getYF('GC=F'),getYF('SI=F'),getYF('HG=F'),getYF('CL=F'),
    getNews()
  ]);

  const fx=fxR.value,cr=crR.value;
  const sp=spR.value,nq=nqR.value,dx=dxR.value,wg=wgR.value;
  const gold=goldR.value,silv=silvR.value,cop=copR.value,oil=oilR.value;
  const news=newsR.value||[];

  // Sparklines rendered inline (history already fetched in getYF call)
  document.getElementById('idx').innerHTML=[
    card('SPX','S&P 500',sp?f2(sp.price,0):'—',sp?.chg,'',sparklineSVG(sp?.history,sp?.chg),'^GSPC'),
    card('NDX','NASDAQ',nq?f2(nq.price,0):'—',nq?.chg,'',sparklineSVG(nq?.history,nq?.chg),'^IXIC'),
    card('DAX','DAX Frankfurt',dx?f2(dx.price,0):'—',dx?.chg,'',sparklineSVG(dx?.history,dx?.chg),'^GDAXI'),
    card('WIG','WIG20 Warszawa',wg?f2(wg.price,0):'—',wg?.chg,'',sparklineSVG(wg?.history,wg?.chg),'^WIG20'),
  ].join('');

  document.getElementById('com').innerHTML=[
    card('XAU','Złoto',gold?f2(gold.price):'—',gold?.chg,'USD/oz',sparklineSVG(gold?.history,gold?.chg),'GC=F'),
    card('XAG','Srebro',silv?f2(silv.price):'—',silv?.chg,'USD/oz',sparklineSVG(silv?.history,silv?.chg),'SI=F'),
    card('HG','Miedź',cop?f2(cop.price,3):'—',cop?.chg,'USD/lb',sparklineSVG(cop?.history,cop?.chg),'HG=F'),
    card('CL','Ropa Brent',oil?f2(oil.price):'—',oil?.chg,'USD',sparklineSVG(oil?.history,oil?.chg),'CL=F'),
  ].join('');

  const eurusd=fx?(1/fx.EUR).toFixed(4):null;
  const usdpln=fx?fx.PLN.toFixed(4):null;
  const gbpusd=fx?(1/fx.GBP).toFixed(4):null;
  const eurpln=fx?(fx.PLN/fx.EUR).toFixed(4):null;
  document.getElementById('fx').innerHTML=[
    card('EUR/USD','Euro / Dolar',eurusd||'—',null),
    card('USD/PLN','Dolar / Złoty',usdpln||'—',null),
    card('GBP/USD','Funt / Dolar',gbpusd||'—',null),
    card('EUR/PLN','Euro / Złoty',eurpln||'—',null),
  ].join('');

  document.getElementById('crypto').innerHTML=[
    {id:'bitcoin',sym:'BTC',name:'Bitcoin'},
    {id:'ethereum',sym:'ETH',name:'Ethereum'},
    {id:'solana',sym:'SOL',name:'Solana'},
    {id:'ripple',sym:'XRP',name:'XRP'},
  ].map(c=>{
    const d=cr?.[c.id],p=d?.usd,ch=d?.usd_24h_change,cl=cc(ch);
    return `<div class="crow">
      <div><div class="cnname">${c.name}</div><div class="cnsym">${c.sym}</div></div>
      <div><div class="cnp">${p?'$'+f2(p,p>100?0:2):'—'}</div><div class="cnch ${cl}">${ch!=null?pct(ch):'—'}</div></div>
    </div>`;
  }).join('');

  document.getElementById('rates').innerHTML=
    `<div class="thead">Stopy procentowe</div>`+
    RATES.map(r=>`<div class="trow"><span class="tk">${r.k}</span><span class="tv tvr">${r.v}</span></div>`).join('');

  document.getElementById('macro').innerHTML=
    `<div class="thead">Dane makroekonomiczne</div>`+
    MACRO.map(r=>`<div class="trow">
      <div><div class="tk">${r.k}</div><div class="tnote">${r.n}</div></div>
      <span class="tv tvm">${r.v}</span>
    </div>`).join('');

  document.getElementById('news').innerHTML=news.length
    ?news.map(n=>`<a class="nitem" href="${n.link}" target="_blank" rel="noopener">
        <div class="nhead">${n.title}</div>
        <div class="nmeta"><span class="nsrc">${n.src}</span><span>${n.date}</span></div>
      </a>`).join('')
    :`<div class="nitem"><div class="nhead" style="color:var(--muted)">Brak wiadomości — sprawdź połączenie internetowe.</div></div>`;

  const ti=[
    {s:'SP500',v:sp?f2(sp.price,0):'—',c:sp?.chg},
    {s:'NASDAQ',v:nq?f2(nq.price,0):'—',c:nq?.chg},
    {s:'DAX',v:dx?f2(dx.price,0):'—',c:dx?.chg},
    {s:'WIG20',v:wg?f2(wg.price,0):'—',c:wg?.chg},
    {s:'GOLD',v:gold?'$'+f2(gold.price):'—',c:gold?.chg},
    {s:'SILVER',v:silv?'$'+f2(silv.price):'—',c:silv?.chg},
    {s:'OIL',v:oil?'$'+f2(oil.price):'—',c:oil?.chg},
    {s:'EUR/USD',v:eurusd||'—',c:null},
    {s:'USD/PLN',v:usdpln||'—',c:null},
    {s:'BTC',v:cr?.bitcoin?.usd?'$'+f2(cr.bitcoin.usd,0):'—',c:cr?.bitcoin?.usd_24h_change},
    {s:'ETH',v:cr?.ethereum?.usd?'$'+f2(cr.ethereum.usd,0):'—',c:cr?.ethereum?.usd_24h_change},
  ];
  const th=ti.map(t=>{
    const cl=cc(t.c);
    return`<span class="ti"><span class="ts2">${t.s}</span><span>${t.v}</span>${t.c!=null?`<span class="${cl==='up'?'tup':'tdn'}">${pct(t.c)}</span>`:''}</span><span class="tdot"></span>`;
  }).join('');
  document.getElementById('ticker').innerHTML=th+th;

  document.getElementById('ts').textContent='Aktualizacja: '+new Date().toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'});
  btn.classList.remove('loading');btn.textContent='↻ Odśwież';
}

fetchAll();
setInterval(fetchAll,5*60*1000);
</script>
</body>
</html>
